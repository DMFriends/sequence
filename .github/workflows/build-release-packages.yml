name: Build release packages

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            os: ubuntu-latest
            package_type: deb
            java_version: "26"
            enable_preview: "true"
          - label: macOS
            os: macos-latest
            package_type: dmg
            java_version: "26"
            enable_preview: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
          fetch-depth: 0

      - name: Resolve package version
        id: package_version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            version="${{ github.event.release.tag_name }}"
          else
            version="$(git tag --list --sort=-v:refname | head -n 1)"
            if [[ -z "$version" ]]; then
              echo "No tags found. Create a version tag before running this workflow manually." >&2
              exit 1
            fi
            git checkout "$version"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java_version }}
          check-latest: true

      - name: Install Linux package tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot

      - name: Build package
        shell: bash
        env:
          APP_VERSION: ${{ steps.package_version.outputs.version }}
          PACKAGE_TYPE: ${{ matrix.package_type }}
          ENABLE_PREVIEW: ${{ matrix.enable_preview }}
        run: bash Java/scripts/package-unix.sh

      - name: Save package artifact
        uses: actions/upload-artifact@v7
        with:
          name: sequence-${{ matrix.package_type }}
          path: Java/release/*

      - name: Attach package to release
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" Java/release/* --clobber
